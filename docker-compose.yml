# docker-compose.yaml
#
# 일반 실행:
#   docker compose up --build
#
# 1회성 작업:
#   docker compose run --rm ingest python export_bq.py      # BQ → 로컬 파일
#   docker compose run --rm ingest python ingest_local.py   # 로컬 파일 → MongoDB
#   docker compose run --rm backend python -m rag.ingest_docs          # 문서 → Qdrant
#   docker compose run --rm backend python -m rag.ingest_docs --reset  # 초기화 후 재적재

services:
  # ── Frontend (Vue.js) ──────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_BASE_URL=http://backend:8000
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    networks:
      - app-network

  # ── Backend (FastAPI + RAG) ────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      mongodb:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_started
    volumes:
      - ./backend:/app
      - hf_cache:/root/.cache/huggingface
    networks:
      - app-network

  # ── MongoDB (GA4 로그 저장소) ──────────────────────────────────────────────
  mongodb:
    image: mongo:7.0
    container_name: mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── MongoDB 웹 UI (개발용) ─────────────────────────────────────────────────
  mongo-express:
    image: mongo-express:1.0.2
    container_name: mongo-express
    restart: unless-stopped
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: ${MONGO_USER}
      ME_CONFIG_MONGODB_ADMINPASSWORD: ${MONGO_PASSWORD}
      ME_CONFIG_MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
      ME_CONFIG_BASICAUTH: "false"
    ports:
      - "8081:8081"
    networks:
      - app-network

  # ── Qdrant (벡터 DB) ───────────────────────────────────────────────────────
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - app-network

  # ── Redis (작업 상태 폴링) ─────────────────────────────────────────────────
  redis:
    image: redis:7.2-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - app-network

  # ── BigQuery → MongoDB 적재 (1회성 Job) ────────────────────────────────────
  ingest:
    build:
      context: ./data/ingest
      dockerfile: Dockerfile
    container_name: bq-ingest
    depends_on:
      mongodb:
        condition: service_healthy
    environment:
      MONGO_URI: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/
      MONGO_DB: ${MONGO_DB}
      MONGO_COLLECTION: ${MONGO_COLLECTION}
      BQ_PROJECT_ID: ${BQ_PROJECT_ID}
      BQ_DATASET: ${BQ_DATASET}
      BQ_DATE_START: ${BQ_DATE_START}
      BQ_DATE_END: ${BQ_DATE_END}
      BQ_BATCH_SIZE: ${BQ_BATCH_SIZE}
      BQ_CHUNK_DAYS: ${BQ_CHUNK_DAYS}
      INGEST_WORKERS: ${INGEST_WORKERS}
      DATA_DIR: /data/ecom-data
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/sa-key.json
    volumes:
      - ${SA_KEY_PATH}:/secrets/sa-key.json:ro
      - ./data/ecom-data:/data/ecom-data
    networks:
      - app-network
    profiles:
      - ingest   # docker compose up 시 자동 실행 안 됨

volumes:
  mongo_data:
  qdrant_data:
  redis_data:
  hf_cache:

networks:
  app-network:
    driver: bridge